<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>StudentCard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="studentCard">
        <div class="scHead">
            <h1>Student Card</h1>
        </div>
        <div class="scBody">
            <label for="name">
                Nama:
                <span id="nameValue">-</span>
            </label>
            <input type="text" id="name" name="name" required placeholder="Masukkan nama">
            <div class="scBtn">
                <button class="svBtn" type="submit">Simpan</button>
                <button class="temaBtn">Ubah Tema</button>
            </div>
            <p>Pesan validasi atau salam akan muncul di sini</p>
        </div>
    </div>
    <script src="script.js"></script>
</body>
</html>
